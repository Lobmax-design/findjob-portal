{% extends "base.html" %}
{% block title %}{{ 'Edit Job' if job else 'Post a Job' }} | FindJob{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-12 col-lg-8">
        <div class="dash-card">
            
            <div class="border-bottom pb-3 mb-4" style="border-color: var(--card-border) !important;">
                <h2 class="fw-bold mb-0" style="color: var(--text-dark-espresso);">{{ 'Edit Job Listing' if job else 'Post a New Job' }}</h2>
            </div>

            <form method="POST">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">Job Title</label>
                        <input type="text" name="title" value="{{ job['title'] if job else '' }}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">Company Name</label>
                        <input type="text" name="company" value="{{ job['company'] if job else '' }}" class="form-control" required>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small">Location</label>
                        <input type="text" name="location" value="{{ job['location'] if job else '' }}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small">Salary Range</label>
                        <input type="text" name="salary" placeholder="e.g. $80k - $100k" value="{{ job['salary'] if job else '' }}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small">Category</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            <option value="IT" {% if job and job['category'] == 'IT' %}selected{% endif %}>IT & Software</option>
                            <option value="Finance" {% if job and job['category'] == 'Finance' %}selected{% endif %}>Finance</option>
                            <option value="Marketing" {% if job and job['category'] == 'Marketing' %}selected{% endif %}>Marketing</option>
                            <option value="Design" {% if job and job['category'] == 'Design' %}selected{% endif %}>Design</option>
                        </select>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold text-muted small">Job Description</label>
                    <textarea name="description" rows="6" class="form-control" required>{{ job['description'] if job else '' }}</textarea>
                </div>

                <div class="d-flex justify-content-between align-items-center border-top pt-4" style="border-color: var(--card-border) !important;">
                    <a href="{{ url_for('my_jobs') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary-warm px-5">{{ 'Save Changes' if job else 'Publish Job' }}</button>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
