{% extends "base.html" %}
{% block title %}Admin Dashboard | FindJob{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="dash-card bg-dark text-white p-4 d-flex justify-content-between align-items-center rounded-3">
            <h2 class="m-0 fw-bold text-white">⚙️ Admin Control Panel</h2>
            <p class="m-0 text-white-50 d-none d-md-block">System Overview</p>
        </div>
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="dash-card text-center h-100 border border-dark">
            <h1 class="display-4 fw-bold text-primary">{{ user_count }}</h1>
            <p class="text-muted fw-bold text-uppercase tracking-wider">Total Users</p>
            <a href="{{ url_for('admin_users') }}" class="btn btn-outline-dark mt-3 w-100">Manage Users &rarr;</a>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="dash-card text-center h-100 border border-dark">
            <h1 class="display-4 fw-bold text-success">{{ job_count }}</h1>
            <p class="text-muted fw-bold text-uppercase tracking-wider">Total Jobs</p>
            <a href="{{ url_for('admin_jobs') }}" class="btn btn-outline-dark mt-3 w-100">Moderate Jobs &rarr;</a>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="dash-card text-center h-100 border border-dark">
            <h1 class="display-4 fw-bold" style="color: var(--primary-rust);">{{ app_count }}</h1>
            <p class="text-muted fw-bold text-uppercase tracking-wider">Applications</p>
            <a href="{{ url_for('admin_applications') }}" class="btn btn-outline-dark mt-3 w-100">View Activity &rarr;</a>
        </div>
    </div>
</div>
{% endblock %}
