{% extends "base.html" %}
{% block title %}Create Account | FindJob{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-4">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--text-dark-espresso);">Create Account</h2>
                <p style="color: var(--text-muted);">Join FindJob to start your journey.</p>
            </div>

            {% if error_msg %}
            <div class="alert alert-danger py-2 px-3 mb-4" role="alert" style="font-size: 0.9rem;">
                {{ error_msg }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold" style="font-size: 0.9rem; color: var(--text-muted);">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold" style="font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold" style="font-size: 0.9rem; color: var(--text-muted);">I want to...</label>
                    <select name="role" class="form-select" required>
                        <option value="seeker">Find a Job (Seeker)</option>
                        <option value="employer">Hire Talent (Employer)</option>
                    </select>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold" style="font-size: 0.9rem; color: var(--text-muted);">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label fw-bold" style="font-size: 0.9rem; color: var(--text-muted);">Confirm Password</label>
                        <input type="password" name="confirm" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Create Account</button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3" style="border-color: var(--card-border) !important;">
                <p class="mb-0" style="color: var(--text-muted); font-size: 0.95rem;">
                    Already have an account? <a href="{{ url_for('login') }}" class="fw-bold">Sign In</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
