{% extends "base.html" %}
{% block title %}Sign In | FindJob{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-12 col-md-6 col-lg-5 col-xl-4">
        
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--text-dark-espresso);">Sign In</h2>
                <p style="color: var(--text-muted);">Welcome back to FindJob.</p>
            </div>

            {% if error_msg %}
            <div class="alert alert-danger py-2 px-3 mb-4" role="alert" style="font-size: 0.9rem;">
                {{ error_msg }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3" style="border-color: var(--card-border) !important;">
                <p class="mb-0" style="color: var(--text-muted); font-size: 0.95rem;">
                    Don't have an account? <a href="{{ url_for('register') }}" class="fw-bold">Create one</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
